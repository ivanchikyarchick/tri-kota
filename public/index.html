<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Три Кота Хоккей</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="online-counter">Онлайн: 0</div>

    <div id="auth">
        <h1>Три Кота Хоккей</h1>
        <div class="selection">
            <input type="text" id="username" placeholder="Имя пользователя" onkeypress="if(event.key === 'Enter') login()"><br><br>
            <input type="password" id="password" placeholder="Пароль" onkeypress="if(event.key === 'Enter') login()"><br><br>
            <button onclick="login()" style="border-color: #4da6ff;">Войти</button>
            <button onclick="register()" style="border-color: #ff99cc;">Регистрация</button>
            <br><br>
            <button id="btn-autologin" onclick="manualAutoLogin()" style="border-color: #ffd700; display: none;">Войти как сохраненный</button>
        </div>
        <p id="auth-status"></p>
    </div>

    <div id="menu" style="display:none;">
        <h1 id="welcome-text">Добро пожаловать!</h1>
        <h2 id="my-elo-display" style="color: #ff9900; margin-top: -10px;">🏆 Рейтинг Эло: 1000</h2>
        
        <div id="voice-settings" style="text-align: center; margin-top: 15px; background: rgba(0,0,0,0.4); padding: 15px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.2);">
            <h3 style="margin-top: 0;">📻 Рация (Голосовой чат)</h3>
            <button id="btn-enable-mic" onclick="initWalkieTalkie()" style="border-color: #4da6ff; margin-bottom: 10px; font-size: 14px; padding: 10px;">
                🎤 Разрешить микрофон
            </button>
            <p id="mic-status" style="font-size: 13px; color: #b3d9ff; margin: 0;">Микрофон не активирован</p>
        </div>
        
        <div class="selection">
            <h3>1. Выбери персонажа:</h3>
            <button id="btn-korzhik"   class="char-btn active-btn" onclick="selectCharacter('korzhik')">Коржик</button>
            <button id="btn-karamelka" class="char-btn"            onclick="selectCharacter('karamelka')">Карамелька</button>
            <button id="btn-kompot"    class="char-btn"            onclick="selectCharacter('kompot')">Компот</button>
            <button id="btn-gonya"     class="char-btn"            onclick="selectCharacter('gonya')">Гоня</button>
        </div>
        
        <div class="selection">
            <h3>2. Выбери режим:</h3>
            <button id="btn-mode-1" class="mode-btn active-btn" onclick="selectMode(1)">1 на 1</button>
            <button id="btn-mode-2" class="mode-btn"            onclick="selectMode(2)">2 на 2</button>
            <button id="btn-mode-3" class="mode-btn"            onclick="selectMode(3)">3 на 3</button>
        </div>
        
        <div class="action-buttons">
            <button id="btn-start"    onclick="startMatchmaking()">СТАРТ</button>
            <button id="btn-spectate" onclick="spectateRandomGame()">👁 Смотреть игру</button>
        </div>
    </div>

    <div id="matchmaking-overlay" style="display: none;">
        <div class="radar"></div>
        <h2 id="mm-text">Поиск достойного соперника...</h2>
        <button onclick="cancelMatchmaking()" style="margin-top: 30px; border-color: #ff4d4d; color: #ff4d4d; background: transparent;">Отмена</button>
    </div>

    <button id="chat-toggle-btn" onclick="toggleChat()" style="display: none;" title="Скрыть/Показать чат">👁️</button>

    <div id="chat-container" style="display: none;">
        <div id="chat-messages"></div>
        <div id="chat-input-wrapper">
            <input type="text" id="chat-input" placeholder="Написать в чат...">
            <button id="chat-btn" onclick="sendChat()">➤</button>
        </div>
    </div>

    <div id="afk-screen" style="display: none; position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.8); z-index: 3000; flex-direction: column; align-items: center; justify-content: center;">
        <h1 style="color: #ff4d4d; font-size: 40px; text-align: center;">ВЫ УСНУЛИ? 😴</h1>
        <p style="color: white; font-size: 20px; text-align: center; margin-bottom: 30px;">Вы были неактивны 15 секунд. Теперь за вас играет БОТ.</p>
        <button onclick="location.reload()" style="padding: 15px 30px; font-size: 20px; background: #ff4d4d; color: white; border: none; cursor: pointer; border-radius: 10px;">Выйти в меню</button>
    </div>

    <button id="ptt-btn" style="display: none; position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); padding: 15px 30px; font-size: 18px; font-weight: bold; background: rgba(0,0,0,0.7); color: white; border: 2px solid #4da6ff; border-radius: 25px; z-index: 1000; user-select: none; -webkit-user-select: none;" 
    onmousedown="startRecording()" onmouseup="stopRecording()" 
    ontouchstart="startRecording(); event.preventDefault();" ontouchend="stopRecording(); event.preventDefault();">
        🎙️ Удерживай (или жми 'V')
    </button>

    <canvas id="gameCanvas" width="1200" height="600"></canvas>

    <script src="/socket.io/socket.io.js"></script>
    <script src="client.js"></script>
</body>
</html>
